name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    name: Compile & test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest and ruff
        # The pack itself ships heavy optional dependencies (torch, demucs,
        # whisper, etc.) that cannot reliably install on every CI matrix
        # entry. The smoke and contract tests are designed to run without
        # those — they parse files and verify discovery logic.
        run: python -m pip install --upgrade pip pytest ruff

      - name: Compile every Python file
        run: python -m compileall -q .

      - name: Run smoke / contract tests
        run: python -m pytest tests -q

      - name: Verify node contract snapshot is up to date
        run: python tools/build_node_contracts.py --check

      - name: Lint with ruff (non-blocking)
        # Surfaces style/quality regressions without blocking merge. Drop
        # `continue-on-error` once the existing baseline is fixed.
        continue-on-error: true
        run: python -m ruff check .
