name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# What this CI actually verifies, post v9.13:
#
#   - tests/ and tools/ are intentionally untracked from this repo (see
#     `.gitignore` and project_memory/feedback_runtime_only_locations.md).
#     They live only in the developer's dev-location and never reach
#     GitHub or the Comfy registry zip. So CI cannot run pytest or the
#     contract-snapshot check — those happen locally before each push.
#
#   - What CI CAN do is parse every shipped Python file and lint it.
#     If a syntax error or import-time crash slipped in, compileall
#     catches it; ruff catches style and a subset of correctness issues.
#
# The matrix covers the three Python versions ComfyUI supports.

jobs:
  compile-and-lint:
    name: Compile & lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff

      - name: Compile every Python file
        run: python -m compileall -q .

      - name: Lint with ruff (non-blocking)
        # Surfaces style / quality regressions without blocking merge.
        # Drop `continue-on-error` once the existing baseline is fixed.
        continue-on-error: true
        run: python -m ruff check .

  # Behavioural smoke: load the pack through a real ComfyUI checkout exactly
  # the way the runtime loader does, and fail on any module that ERRORs at
  # import time or if the registered node count regresses. compileall above
  # only proves the files parse; this proves the import graph (comfy_api
  # surface, cross-module imports, route registration) actually resolves.
  smoke-import:
    name: Smoke import via ComfyUI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: pack

      - name: Check out ComfyUI
        run: git clone --depth 1 https://github.com/comfyanonymous/ComfyUI.git comfyui

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            comfyui/requirements.txt
            pack/requirements.txt

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r comfyui/requirements.txt
          pip install -r pack/requirements.txt

      - name: Install pack into custom_nodes
        run: |
          mkdir -p comfyui/custom_nodes
          cp -r pack comfyui/custom_nodes/comfyui-timesaver

      - name: Import every node module through the loader
        working-directory: comfyui
        run: |
          python - <<'EOF'
          import importlib
          import sys

          sys.path.insert(0, ".")
          sys.path.insert(0, "custom_nodes")

          pack = importlib.import_module("comfyui-timesaver")
          results = pack._MODULE_LOAD_RESULTS
          errors = [r for r in results if r["status"] == "ERROR"]
          skipped = [r for r in results if r["status"] == "SKIPPED"]
          nodes = len(pack.NODE_CLASS_MAPPINGS)

          print(f"modules={len(results)} nodes={nodes} "
                f"errors={len(errors)} skipped={len(skipped)}")
          for r in skipped:
              print(f"  SKIPPED {r['module']}: {r['details']}")
          for r in errors:
              print(f"  ERROR   {r['module']}: {r['details']}")

          # Optional-deps modules (silero, demucs) may legitimately SKIP;
          # an ERROR is always a shipped regression.
          assert not errors, f"{len(errors)} module(s) failed to import"
          assert nodes >= 50, f"node count regressed: {nodes} < 50"
          EOF
